# Standalone deploy for the Quorex engine ONLY.
# Use this only if you run the engine on a different host than quorex-web.
# If you use quorex-web/docker-compose.yml, the engine is ALREADY included there
# (built from ../quorex) — don't run both, you'd get two engines.
services:
  engine:
    build:
      context: .
      dockerfile: src/quorex/api/Dockerfile
    container_name: quorex-engine
    restart: always
    environment:
      QUOREX_INTERNAL_KEY: ${QUOREX_INTERNAL_KEY}
      QUOREX_DB_PATH: /data/quorex_memory
      QUOREX_ENCODER_PATH: /data/quorex_encoder
      QUOREX_DIMS: "32"
    volumes:
      - engine_data:/data
    networks:
      - quorex-network

volumes:
  engine_data:

networks:
  quorex-network:
    driver: bridge
